<!doctype html>
<html lang="en-GB">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0">
    <link rel="shortcut icon" href="./favicon.png" type="image/x-icon">
    <title>Sweet Bonanza Wheel</title>
    <meta name="format-detection" content="telephone=no">
    
    <link rel="stylesheet" href="./style.css" type="text/css">

    <link rel="preload" href="./fonts/OpenSans-Bold.ttf" as="font" type="font/ttf" crossorigin>

  </head>
  <body class="body">
    
    <div class="wheel-container">
      <div class="container">
        <a href="/" class="logo-block">
          <img src="./images/logo.png" alt="Logo">
        </a>
        <div class="wheel-block">
          <div class="wheel-title">
              <div class="text-shadow">
                <div class="text-top">TOURNE LA ROUE</div>
              </div>
              <div class="text-shadow">
                <div class="text-bottom">ET GAGNEZ DES BONUS</div>
              </div>
          </div>
          <div class="wheel-block-content">
            <div class="wheel-circle"></div>
            <div class="wheel-arrow"></div>
            <div class="wheel-sector"></div>
            <img class="wheel-img wheel-img-animated" src="./images/wheel.png" alt="Wheel">
            <button class="btn wheel-btn first-spin">
              <div class="btn-text">
                <div class="btn-element">Spin</div>
              </div>
            </button>
          </div>
          <div class="person-block">
            <img src="./images/olimpys.png" alt="Olimpys">
          </div>
        </div>
      </div>
    </div>

    <div class="wheel-modal" id="modal-window">
      <div class="wheel-modal-block" id="modal-1">
        <div class="wheel-modal-content">
          <div class="wheel-popup">
            <div class="popup-content">
              <span class="wheel-popup-title">Tu as gagné</span>
              <span class="wheel-popup-text">200% jusqu'à 500 € sur votre premier dépôt</span>
              <img src="./images/popup-img.png" alt="Popup img">
              <a href="{offer_link}" class="wheel-popup-btn" id="popup-btn">OBTENEZ LE BONUS</a>
            </div>
          </div>
        </div>
      </div>
    </div>

    <script src="./js/jquery-3.5.1.min.js"></script>
    <script src="./js/wheel.js"></script>
    
  </body>
</html>
